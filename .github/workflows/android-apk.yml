name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Inject UsageStats Kotlin plugin
        run: node scripts/inject-android-plugin.mjs

      - name: Generate launcher icons and splash from resources/
        run: |
          bun add -d @capacitor/assets
          bunx @capacitor/assets generate --android --iconBackgroundColor '#FFFFFF' --splashBackgroundColor '#F7FBF4' || echo "asset gen warning ignored"

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: treerise-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
